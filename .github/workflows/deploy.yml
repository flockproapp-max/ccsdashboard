name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build timestamp into sw.js
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/const CACHE_VERSION = .*/const CACHE_VERSION = 'hvac-v9-'${TIMESTAMP}';/" sw.js
          echo "Cache version set to: hvac-v9-${TIMESTAMP}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
